  - type: Features
    data:
      - name: Real-Time Marginal Emissions
        description: >-
          CO2 MOER signal providing real-time marginal carbon intensity for
          local grid regions, updated every 5 minutes via the forecast
          endpoint.
      - name: Emissions Forecasting
        description: >-
          24-72 hour ahead emissions forecasts enabling applications to schedule
          energy-intensive workloads during low-carbon grid windows.
      - name: Historical Data Access
        description: >-
          Historical MOER data available for up to 32 days via the data
          endpoint, and multi-year historical datasets downloadable as CSV
          files.
      - name: Health Damage Signal
        description: >-
          Estimates the damage to human life and health caused by emissions from
          electricity generation based on time and location of consumption.
      - name: Global Grid Coverage
        description: >-
          Coverage across 342 grid regions in 210 countries and territories,
          including North America, Europe, and global expansion with
          synthetic demand proxy models.
      - name: Grid Region Discovery
        description: >-
          Identify the relevant balancing authority for any geographic
          coordinates and retrieve the list of accessible grid regions.
      - name: Model Versioning
        description: >-
          Date-based model versioning (e.g., 2026-03-01) allowing unique
          versions per region and signal for reproducibility and comparison.
  - type: UseCases
    data:
      - name: Carbon-Aware Computing
        description: >-
          Technology companies and cloud providers schedule compute workloads,
          data transfers, and batch jobs to run during periods of low marginal
          carbon intensity.
      - name: Clean Energy Procurement
        description: >-
          Organizations measure the actual emissions reductions from renewable
          energy procurement and power purchase agreements using marginal
          emissions data.
      - name: Sustainability Reporting
        description: >-
          Enterprises report Scope 2 emissions more accurately using marginal
          emissions rates rather than average grid emission factors.
      - name: Smart Building Optimization
        description: >-
          Building energy management systems shift heating, cooling, and EV
          charging to low-emission grid windows to reduce carbon footprint.
      - name: Grid Research and Analysis
        description: >-
          Researchers, utilities, and policy makers analyze historical and
          forecast emissions data to study grid decarbonization trends.
  - type: Integrations
    data:
      - name: Green Software Foundation
        description: >-
          WattTime provides the carbon intensity data underlying the Green
          Software Foundation's Software Carbon Intensity (SCI) specification.
      - name: Climate TRACE
        description: >-
          WattTime contributes emissions data and modeling to the Climate TRACE
          global emissions inventory.
      - name: Impact Framework
        description: >-
          Official Green Software Foundation Impact Framework plugin available
          for integrating WattTime data into software sustainability
          measurements.

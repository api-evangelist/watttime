aid: watttime
name: WattTime
description: >-
  WattTime is a nonprofit organization that provides real-time, forecast, and
  historical data for electric grids around the world, enabling carbon-aware
  computing and clean energy procurement decisions. The WattTime API delivers
  marginal emissions data (CO2 MOER), health damage signals, average emissions
  rates, and renewable energy forecasts for 342 grid regions across 210
  countries and territories. Developers and organizations use the API to
  schedule workloads during low-carbon windows, measure actual emissions
  reductions from clean energy procurement, and meet sustainability reporting
  requirements.

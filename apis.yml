apis:
  - aid: watttime:watttime
    name: WattTime API
    description: >-
      The WattTime Data API v3 provides access to real-time, forecast, and
      historical marginal emissions data for electric grids worldwide. Key
      signals include CO2 MOER (Marginal Operating Emissions Rate), health
      damage estimates, and CO2 AOER (Average Operating Emissions Rate). The
      API covers 342 grid regions in 210 countries and territories, with
      real-time data updated every five minutes via the forecast endpoint.
